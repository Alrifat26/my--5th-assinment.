<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F6F8FA; }
        
        
        .border-open { border-top: 6px solid #22c55e !important; } 
        .border-closed { border-top: 6px solid #d244ef !important; }
        
      
        .active-tab { border-bottom: 3px solid #0969da; color: #1F2328; font-weight: 600; }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>

    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-xl shadow-xl border border-gray-200 w-full max-w-[400px] text-center">
            <img src="assets/github-logo.png" alt="Logo" class="w-14 mx-auto mb-6"> <h1 class="text-2xl font-bold text-[#1F2328] mb-2">GitHub Issues Tracker </h1>
            <p class="text-sm text-gray-500 mb-8">Sign in to Manage your Issues</p>
            
            <div class="text-left space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none focus:border-blue-500 transition">
                </div>
                <button onclick="handleLogin()" class="w-full bg-[#2DA44E] text-white font-semibold py-2.5 rounded-md hover:bg-[#2c974b] transition shadow-sm">
                    Sign In
                </button>
            </div>
            
            <div class="mt-8 pt-6 border-t border-gray-100 text-xs text-gray-400">
                Demo Credentials: <span class="font-bold">admin / admin123</span>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <nav class="bg-[#24292F] px-8 py-3 flex justify-between items-center shadow-md sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <img src="assets/github-logo.png" class="w-8 h-8"> <span class="font-bold text-lg text-white tracking-tight text-white">IssueTracker</span>
            </div>
            <div class="flex items-center gap-3">
                <input type="text" id="search-input" placeholder="Search issues..." class="bg-[#31363c] border border-[#444c56] text-sm text-white px-4 py-1.5 rounded-md w-64 focus:w-80 transition-all outline-none">
                <button onclick="handleSearch()" class="bg-[#31363c] border border-[#444c56] text-white px-4 py-1.5 rounded-md text-sm hover:bg-[#444c56]">Search</button>
            </div>
        </nav>

        <div class="container mx-auto max-w-[1200px] mt-10 p-6">
            <div class="flex gap-8 border-b border-gray-200 mb-8">
                <button id="tab-all" onclick="filterIssues('all')" class="active-tab pb-4 text-sm font-medium">All Issues</button>
                <button id="tab-open" onclick="filterIssues('open')" class="pb-4 text-sm text-gray-500 hover:text-black">Open</button>
                <button id="tab-closed" onclick="filterIssues('closed')" class="pb-4 text-sm text-gray-500 hover:text-black">Closed</button>
            </div>

            <div id="loader" class="hidden text-center py-20">
                <div class="w-10 h-10 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin mx-auto"></div>
                <p class="mt-4 text-gray-500">Fetching issues...</p>
            </div>

            <div id="issues-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden relative animate-in fade-in zoom-in duration-300">
            <button onclick="closeModal()" class="absolute top-4 right-5 text-gray-400 hover:text-red-500 text-3xl">&times;</button>
            <div id="modal-body" class="p-10"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
